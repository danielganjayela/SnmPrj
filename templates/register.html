<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#43cea2,#185a9d);
        }

        .form-box{
            width:400px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin:12px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#28a745;
            color:white;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1e7e34;
        }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Register Form</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Enter Username" required>

            <input type="password" name="userpassword" placeholder="Enter Password" required>

            <input type="email" name="useremail" placeholder="Enter Email" required>

            <input type="tel" name="userphone_no" placeholder="Enter Phone Number" required>

            <button type="submit">Register</button>
            <div class="container">
<div class="container">
    {% with messages = get_flashed_messages() %}
  {% if messages %}
    <ul class=flashes>
    {% for message in messages %}
      <li>{{ message }}</li>
    {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

</body>
</html>
