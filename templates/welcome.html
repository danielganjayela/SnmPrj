<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome snm project</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            background:white;
            padding:40px;
            width:350px;
            text-align:center;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom:30px;
            color:#333;
        }

        .btn{
            display:block;
            width:100%;
            padding:12px;
            margin:15px 0;
            text-decoration:none;
            background:#007bff;
            color:white;
            border-radius:8px;
            font-size:18px;
            transition:0.3s;
        }

        .btn:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>
    

    <div class="container">
        <h1>Welcome snm project</h1>

        <a href="{{url_for('register')}}" class="btn">Register</a>
        <a href="{{url_for('login')}}" class="btn">Login</a>
    </div>
    </body>

</body>
</html>
