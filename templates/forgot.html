<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/static/forgot.css">
</head>
<body>

    <h2>Forgot Password</h2>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for msg in messages %}
                    <li>{{ msg }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Enter Email</label><br>
        <input type="email" name="useremail" required><br><br>

        <button type="submit">Send OTP</button>
    </form>

</body>
</html>
